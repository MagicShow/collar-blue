[railway]
  # The server is a Node.js/Express service
  # Frontend (Vercel) proxies /api/* to this service

[build]
  # Use Dockerfile for deterministic builds
  builder = "docker"

[deploy]
  startCommand = "node src/index.js"
  healthCheckPath = "/api/health"

[environment]
  # Railway injects PORT automatically — do NOT hardcode it
  # NODE_ENV is set automatically

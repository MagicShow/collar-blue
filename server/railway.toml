[railway]
  # The server is a Node.js/Express service
  # Frontend (Vercel) proxies /api/* to this service

[build]
  # npm install runs automatically before start
  builder = "nixpacks"

[nixpacks]
  # Let Railway detect Node.js from package.json
  # No custom build script needed — clean Express drop-in

[deploy]
  startCommand = "node src/index.js"
  healthCheckPath = "/api/health"

[environment]
  # Railway injects PORT automatically — do NOT hardcode it
  # NODE_ENV is set automatically
